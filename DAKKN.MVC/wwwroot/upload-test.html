<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Upload Test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f7f6; }
        .container { max-width: 600px; margin: 40px auto; border: 1px solid #ddd; padding: 30px; border-radius: 12px; background-color: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #333; margin-top: 0; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        input[type="file"], input[type="number"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background-color 0.2s; }
        button:hover { background-color: #0056b3; }
        #result { margin-top: 25px; padding: 15px; border-radius: 6px; display: none; white-space: pre-wrap; word-break: break-all; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background-color: #e2e3e5; color: #383d41; border: 1px solid #d6d8db; }
    </style>
</head>
<body>
    <div class="container">
        <h2>DAKKN File Upload Test</h2>
        <p style="color: #666; font-size: 0.9em; margin-bottom: 20px;">Use this page to test the file upload functionality against the API.</p>
        <form id="uploadForm">
            <div class="form-group">
                <label for="file">Select File:</label>
                <input type="file" id="file" name="file" required>
            </div>
            <div class="form-group">
                <label for="place">Place (Entity association/index):</label>
                <input type="number" id="place" name="place" value="0">
            </div>
            <button type="submit" id="submitBtn">Upload File</button>
        </form>
        <div id="result"></div>
    </div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const resultDiv = document.getElementById('result');
            const submitBtn = document.getElementById('submitBtn');
            
            resultDiv.style.display = 'block';
            resultDiv.className = 'info';
            resultDiv.innerText = 'Uploading... Please wait.';
            submitBtn.disabled = true;

            const formData = new FormData();
            const fileInput = document.getElementById('file');
            const placeInput = document.getElementById('place');

            formData.append('file', fileInput.files[0]);
            
            const url = `/api/v1/attachments?place=${placeInput.value}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    resultDiv.className = 'success';
                    resultDiv.innerText = `Success!\n\nMessage: ${data.message}\nFile ID: ${data.data.fileId}\nFile Name: ${data.data.fileName}\nPublic URL: ${data.data.publicUrl}`;
                } else {
                    resultDiv.className = 'error';
                    resultDiv.innerText = `Error (${response.status}):\n\n${JSON.stringify(data, null, 2)}`;
                }
            } catch (error) {
                resultDiv.className = 'error';
                resultDiv.innerText = `Fetch Error: ${error.message}`;
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
